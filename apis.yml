  - Payment Processing
apis:
  - name: dLocal Payins API
    description: Accept payments from customers in emerging markets using 1,000+ local payment methods including cards, bank transfers, cash, mobile money, eWallets, and Pix. Supports 3D Secure, installments, recurring payments, merchant-initiated transactions, and authorization/capture flows.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.dlocal.com/reference/api
    baseURL: https://api.dlocal.com
    tags:
      - Payments
      - Payins
      - Cards
      - Bank Transfers
      - Mobile Money
    properties:
      - type: Documentation
        url: https://docs.dlocal.com/docs/full-api
      - type: OpenAPI
        url: https://docs.dlocal.com/llms.txt
      - type: Authentication
        url: https://docs.dlocal.com/reference/payins-security
      - type: PostmanCollection
        url: https://docs.dlocal.com/reference/postman-api-collection
  - name: dLocal Payouts API
    description: Distribute funds globally with multi-currency support and local compliance across 60+ emerging market countries. Includes payout submission and retrieval, balance checking, quote generation for currency exchange, payout cancellation and release, and account-specific operations.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.dlocal.com/reference/api
    baseURL: https://api.dlocal.com
    tags:
      - Payouts
      - Disbursements
      - Currency Exchange
      - Mass Payments
    properties:
      - type: Documentation
        url: https://docs.dlocal.com/docs/full-api
      - type: Authentication
        url: https://docs.dlocal.com/reference/payins-security
  - name: dLocal Platforms API
    description: Complete solution for marketplaces and platforms with automated account onboarding, KYC information handling, bank account management, transfer operations, and account status and balance queries.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.dlocal.com/reference/api
    baseURL: https://api.dlocal.com
    tags:
      - Platforms
      - Marketplaces
      - KYC
      - Onboarding
    properties:
      - type: Documentation
        url: https://docs.dlocal.com/docs/full-api
      - type: Authentication
        url: https://docs.dlocal.com/reference/payins-security
  - name: dLocal Verification API
    description: Identity verification and document management API supporting verification creation and retrieval, document management, and status updates for compliance workflows across emerging markets.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.dlocal.com/reference/api
    baseURL: https://api.dlocal.com
    tags:
      - Verification
