name: dLocal Plans and Pricing
description: dLocal uses a custom enterprise pricing model tailored to each merchant's transaction volume, target markets, and payment method mix across emerging markets in Africa, Asia, and Latin America. Pricing includes setup fees, monthly account management fees, and per-transaction fees negotiated based on expected volumes. No self-serve public pricing tiers are published; merchants must contact sales for a quote.
version: "0.1"
url: https://www.dlocal.com/faqs/faqs-solutions/
plans:
  - name: Enterprise Custom
    description: Custom pricing plan for merchants processing payments across emerging markets. Fees are negotiated based on transaction volume, geography, and payment method mix. Includes setup fees, monthly account management fees, and per-transaction rates.
    contact: https://www.dlocal.com/contact/
    features:
      - Access to 60+ emerging market countries
      - 1,000+ local payment methods
      - Cards, cash, bank transfers, mobile money, eWallets, Pix
      - Payins and Payouts through a single API
      - Sandbox environment for testing
      - Merchant Dashboard access
      - 3D Secure authentication support
      - Installment payment support
      - Recurring payments
      - Authorization and capture flows
      - Network tokenization (India)
      - Multi-currency settlement
      - FX conversion services
      - dLocal for Platforms (marketplace solution)
    pricing:
      model: custom-enterprise
      setupFee: negotiated
      monthlyFee: negotiated
      transactionFee: negotiated
      currency: USD
    notes:
      - Pricing varies by country, payment method, and transaction volume
      - Minimum fee commitments may apply based on expected volumes
      - Contact dLocal sales team for a custom quote
      - Two-factor authentication required on merchant accounts
